services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - ../.env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: sqlite:////app/tracker.db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
